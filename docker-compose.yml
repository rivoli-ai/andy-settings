services:
  postgres:
    image: postgres:16-alpine
    container_name: andy-settings-postgres
    environment:
      POSTGRES_DB: andy_settings
      POSTGRES_USER: andy_settings
      POSTGRES_PASSWORD: andy_settings_dev_password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "7438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U andy_settings -d andy_settings"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - andy-settings-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
      additional_contexts:
        certs: ./certs
    container_name: andy-settings-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=https://+:8443;http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=andy_settings;Username=andy_settings;Password=andy_settings_dev_password
      # Set to empty to use dev auth bypass (no JWT required).
      # For production, set to: https://host.docker.internal:5001
      - AndyAuth__Authority=
      - AndyAuth__Audience=urn:andy-settings-api
      - AndyAuth__RequireHttpsMetadata=false
      - Rbac__ApiBaseUrl=https://host.docker.internal:5003
      - Rbac__ApplicationCode=settings
      # Registration manifests — seed setting definitions from each sibling
      # service's config/registration.json. andy-settings is cloud-only so
      # these paths reflect the Rivoli AI monorepo mount in dev; production
      # populates REGISTRATIONS__MANIFEST_PATHS from the cloud manifest bundle.
      - REGISTRATIONS__MANIFEST_PATHS=/monorepo/andy-auth/config/registration.json:/monorepo/andy-rbac/config/registration.json:/monorepo/andy-containers/config/registration.json:/monorepo/andy-docs/config/registration.json:/monorepo/andy-code-index/config/registration.json:/monorepo/andy-issues/config/registration.json:/monorepo/andy-agents/config/registration.json:/monorepo/andy-tasks/config/registration.json:/monorepo/andy-policies/config/registration.json:/monorepo/andy-settings/config/registration.json:/monorepo/andy-models/config/registration.json
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "7300:8443"
      - "7301:8080"
    volumes:
      - ./certs:/usr/local/share/ca-certificates/custom:ro
      - dpkeys:/app/.aspnet/DataProtection-Keys
      - ..:/monorepo:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:8443/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - andy-settings-network

volumes:
  dpkeys:
  postgres_data:

networks:
  andy-settings-network:
    driver: bridge
